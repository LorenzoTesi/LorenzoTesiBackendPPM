{% extends 'base.html' %}

{% block title %}Login{% endblock %}
{% block content %}
<h2>Accedi al tuo Account</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Accedi</button>
</form>
<p>Non hai un account? <a href="{% url 'utente:register' %}">Registrati qui</a>.</p>
{% endblock %}
