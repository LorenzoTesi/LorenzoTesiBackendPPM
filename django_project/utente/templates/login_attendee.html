{% extends 'base.html' %}

{% block title %}Login Partecipante{% endblock %}

{% block content %}
<h2>Accedi come Partecipante</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Accedi</button>
</form>
<p>Non hai un account?
    <a href="{% url 'utente:register' %}">Registrati qui</a>.
</p>
<p>Sei un organizzatore?
    <a href="{% url 'utente:login_organizer' %}">Accedi qui</a>.
</p>
{% endblock %}
