{% extends 'base.html' %}

{% block title %}Login Organizzatore{% endblock %}

{% block content %}
<h2>Accedi come Organizzatore</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Accedi</button>
</form>
<p>Sei un partecipante?
    <a href="{% url 'utente:login_partecipante' %}">Accedi qui</a>.
</p>
{% endblock %}
